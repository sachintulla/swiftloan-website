<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" role="img" aria-label="SwiftLoan — Fast, Fair, Secure">
  <defs>
    <linearGradient id="sl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0CB6A6"/>
      <stop offset="1" stop-color="#2FB183"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g>
    <rect x="0" y="14" width="92" height="92" rx="23" fill="url(#sl)"/>
    <g stroke="#fff" stroke-linecap="round" fill="none" transform="translate(0,14) scale(0.767)">
      <line x1="16" y1="43" x2="40" y2="43" stroke-width="6" opacity=".32"/>
      <line x1="12" y1="60" x2="38" y2="60" stroke-width="6" opacity=".55"/>
      <line x1="18" y1="77" x2="42" y2="77" stroke-width="6" opacity=".82"/>
    </g>
    <g transform="translate(0,14) scale(0.767) skewX(-7)">
      <text x="82" y="87" text-anchor="middle" fill="#fff"
        font-family="'Public Sans','Segoe UI',Arial,sans-serif" font-size="84" font-weight="800">&#8377;</text>
    </g>
  </g>

  <!-- wordmark -->
  <text x="112" y="66" font-family="'Public Sans','Segoe UI',Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.4">
    <tspan fill="#079FA0">Swift</tspan><tspan fill="#0F2A2B">Loan</tspan>
  </text>
  <text x="114" y="90" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12.5" font-weight="600" letter-spacing="4.2" fill="#93A3A3">FAST · FAIR · SECURE</text>
</svg>
